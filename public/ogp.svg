<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#FF6584"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- 装飾ライン -->
  <rect x="0" y="580" width="1200" height="6" fill="url(#accent)"/>
  <rect x="0" y="44" width="1200" height="3" fill="url(#accent)" opacity="0.4"/>
  <!-- 星 -->
  <circle cx="80" cy="80" r="2" fill="white" opacity="0.6"/>
  <circle cx="200" cy="40" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="1100" cy="100" r="2" fill="white" opacity="0.5"/>
  <circle cx="1050" cy="50" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="950" cy="120" r="1" fill="white" opacity="0.4"/>
  <circle cx="150" cy="500" r="2" fill="white" opacity="0.3"/>
  <circle cx="1150" cy="450" r="1.5" fill="white" opacity="0.5"/>
  <!-- メインテキスト -->
  <text x="600" y="220" font-family="'Segoe UI', Arial, sans-serif" font-size="90" font-weight="900" fill="white" text-anchor="middle">⚔️ Capital Wars</text>
  <text x="600" y="300" font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="700" fill="#FFD700" text-anchor="middle">資本戦争ボードゲーム</text>
  <!-- サブテキスト -->
  <text x="600" y="390" font-family="'Segoe UI', Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.8)" text-anchor="middle">会社・株・ATMを駆使して最大の資産を築け！</text>
  <!-- バッジ -->
  <rect x="300" y="440" width="600" height="70" rx="35" fill="rgba(108,99,255,0.3)" stroke="#6C63FF" stroke-width="2"/>
  <text x="600" y="485" font-family="'Segoe UI', Arial, sans-serif" font-size="26" fill="white" text-anchor="middle">🏢 会社経営　📈 株投資　🏧 ATM　🎲 サイコロ</text>
  <!-- アイコン群 -->
  <text x="180" y="180" font-size="60" text-anchor="middle">💰</text>
  <text x="1020" y="180" font-size="60" text-anchor="middle">🏆</text>
</svg>
